<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Task-House</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="img/sh.png" alt="Task House Logo" class="logo-img transparent-bg">
            
        </div>
        <div class="header-icons">
            <a href="mailto:careers@virtualbiznest.com" class="icon"><i class="fas fa-envelope"></i></a>
            <a href="#" class="icon"><i class="fas fa-clock"></i></a>
            <a href="#" class="icon"><i class="fas fa-camera"></i></a>
        </div>
        
    </header>

    <div class="sidebar">
        <div class="profile">
            <img src="img/profile.png" alt="Profile Picture" class="profile-pic">
            <h3>Christian Kier Ortalla</h3>
            <a href="#" class="edit-profile">Edit Profile</a>
        </div>
        <nav class="nav">
            <a href="#" class="active"><i class="fas fa-home"></i> Welcome</a>
            <a href="#"><i class="fas fa-tasks"></i> My Tasks <span class="badge">1</span></a>
            <a href="#"><i class="fas fa-cogs"></i> Operation</a>
            <a href="#"><i class="fas fa-users"></i> Human Resources</a>
        </nav>
    </div>

    <div class="main-container">
        <img src="img/banner.png" alt="Banner" class="banner-image">
        <p class="welcome-message">Welcome to Virtual BizNest!</p>
        <p class="sub-message">Join us in making a difference through successful referrals.</p>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
